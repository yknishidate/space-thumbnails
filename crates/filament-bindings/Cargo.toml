[package]
name = "filament-bindings"
version = "0.2.2"
license = "Apache-2.0"
authors = ["EYHN <cneyhn@gmail.com>"]
description = "This package provides build scripts and prebuilt binaries for filament on Windows, macOS, Linux, and the unsafe binding interface automatically generated by rust-bindgen."
edition = "2021"
rust-version = "1.56"
repository = "https://github.com/EYHN/rust-filament/tree/main/filament-bindings"
keywords = ["test", "testing"]
readme = "README.md"
exclude = ["/filament"]

[lib]
doctest = false

[build-dependencies]
serde_json = "1.0"
tar = "0.4"
serde = { version = "1.0", features = ["derive"] }
flate2 = "1.0"
ureq = "2.4"
num_cpus = "1.13"
cc = "1.0"

[features]
default = ["assimp"]
# Controls only Filament's prebuilt binaries. Assimp is maintained and built
# independently by the vendored russimp-sys-static crate.
prebuilt = []
assimp = ["russimp-sys-static", "image"]
# Alembic (.abc) mesh reading, built independently by the vendored alembic-sys
# crate (Imath + Alembic, Ogawa only).
alembic = ["alembic-sys"]

[dependencies]
bitflags = "1.3"
num_enum = "0.5"
half = "1.8"
russimp-sys-static = { path = "../russimp-sys-static", default-features = false, optional = true }
# decodes material textures for the assimp path (external files and embedded)
image = { version = "0.24", default-features = false, features = ["png", "jpeg", "bmp", "tga", "tiff", "dds", "webp", "openexr", "hdr"], optional = true }
alembic-sys = { path = "../alembic-sys", optional = true }

[dev-dependencies]
winit = "0.26"

[[example]]
name = "assimp"
required-features = ["assimp"]

[[example]]
name = "winit"

[[example]]
name = "triangle"
